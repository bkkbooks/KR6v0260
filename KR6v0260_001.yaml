body:
  text: 大覺之寺軒義之世真容寂默彰之年爰及室肇現閻浮生滅相因報應斯是以慧心獨悟之智自登彼岸之果聾所見之永沉苦海之際佛弟子邑主都督瓽仲義邑師比丘智盛合邑子八十人等思五濁之多果慕須達之金錢深體无常同遵正覺共造石像壹區高七尺五寸莊嚴種好垂相滿庭慈悲道俗咸變圜中求勝因於曩劫獲妙果於當今在村處中置立南臨白水北背馬蘭東俠洛水西望堯山地居爽塏眾所歸仰藉此微功願皇帝陛下与日月齊暉群公百辟與天壤同蔽邑七世父母長居妙樂見在眷屬迴向上道竊惟竹素是播演之宗金石是記善之原非刊非瑑何以宣言其辭曰巍巍紫山獨秀童童娑羅集聖遍滿虛空亭子出入相容不有不無非紫非紅攸哉大智實唯世尊拯彼眾生濟此重昏五欲自屏三惑無根拔苦伊何歸依法門生同泡沫滅若電飛白日恒昭夜月長暉業淺福倚道勝則肥百年俄頃營營何希分財奉寶散浮圖刑漏以金玉飾以丹青神光嚴起曠濟群生舟樑苦海曆劫踰明建德元年歲次壬辰四月癸酉朔八日庚辰建立
